name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-flight run when a new commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-intelligence:
    name: tests · intelligence
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/intelligence
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # intelligence keeps dev deps (pytest, ruff) under [project.optional-dependencies],
      # which `uv sync` does NOT install by default — hence --all-extras.
      - run: uv sync --all-extras
      - run: uv run pytest -q

  test-data-ingestion:
    name: tests · data-ingestion
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/data-ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run pytest -q

  test-backend:
    name: tests · backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    # Settings() requires NEO4J_PASSWORD at import time (no default). Tests mock
    # Neo4j, so a dummy value is enough to let the app import under pytest.
    env:
      NEO4J_PASSWORD: ci-test-password
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run pytest -q

  test-vision-enrichment:
    name: tests · vision-enrichment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/vision-enrichment
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # dev deps (pytest, pytest-asyncio) live under [project.optional-dependencies].
      - run: uv sync --all-extras
      - run: uv run pytest -q

  test-frontend:
    name: tests · frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # package-lock.json is gitignored repo-wide (no committed lockfiles), so
      # `npm ci` / setup-node caching can't be used — resolve from package.json.
      - run: npm install
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm run build

  lint-python:
    name: ruff · all services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff on all Python services (full-repo, per-service config)
        env:
          # Pinned for reproducibility; matches the ruff floor in each service's dev deps.
          RUFF_VERSION: "0.15.15"
        run: |
          set -euo pipefail
          # Pre-existing debt was cleared (2026-06-01); the whole tree must stay clean.
          # ruff resolves each file's [tool.ruff] config from its own service pyproject.
          uvx "ruff@${RUFF_VERSION}" check \
            services/intelligence \
            services/data-ingestion \
            services/backend \
            services/vision-enrichment

  guard-read-templates:
    name: guard · read templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid ORDER BY ev.timestamp on read templates (WP-08)
        run: |
          set -euo pipefail
          # ev.timestamp is never written by any write-path; read templates must
          # use coalesce(ev.timeline_at, ev.timestamp, ev.date_added) and ORDER BY
          # the projected alias. These two files are the complete read-template
          # surface that orders by event time (timeline.py uses ev.timeline_at);
          # add new paths here if more event-time read templates are introduced.
          if grep -n "ORDER BY ev.timestamp" \
              services/backend/app/routers/graph.py \
              services/intelligence/agents/tools/graph_templates.py; then
            echo "::error::Found 'ORDER BY ev.timestamp' in a read template — sort on the coalesced timestamp alias (WP-08)."
            exit 1
          fi
          echo "OK: no 'ORDER BY ev.timestamp' in read templates"
