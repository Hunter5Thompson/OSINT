server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS. Required so the proxy_pass below re-resolves the
    # `backend` container name at REQUEST time instead of caching its IP once at
    # config-load. Without this, recreating the backend container (model swap,
    # `odin.sh up interactive`, rebuild) gives it a new IP and this 11-day-old
    # nginx keeps hitting the dead old one → 502 on every /api/ and /ws/ call.
    resolver 127.0.0.11 valid=10s;

    # Content-hashed build assets — Vite emits /assets/[name]-[hash].{js,css},
    # so a given filename never changes content. Safe to cache aggressively;
    # a new build produces new filenames.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html and the static data files (/country-endonyms.json,
    # /countries-110m.json, …) are served at stable, non-hashed URLs. They MUST
    # be revalidated on every load — otherwise a returning visitor keeps a stale
    # cached copy after a deploy. That is exactly what broke the country-click
    # Almanac + capital: browsers held the pre-P4 8-country country-endonyms.json.
    # no-cache = always revalidate via ETag (cheap 304 when unchanged, fresh 200
    # right after a deploy).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # proxy_pass via a VARIABLE (not a bare literal) forces nginx to resolve the
    # upstream per request through the resolver above. $request_uri preserves the
    # full original path+query (matches the previous literal proxy_pass behaviour).
    location /api/ {
        set $api_upstream http://backend:8000;
        proxy_pass $api_upstream$request_uri;
    }

    location /ws/ {
        set $ws_upstream http://backend:8000;
        proxy_pass $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
