version: "1.0"
categories:
  military:
    label: "Military"
    types:
      - type: "military.airstrike"
        label: "Airstrike"
        description: "Fixed-wing or rotary-wing aircraft strike on a target"
      - type: "military.drone_attack"
        label: "Drone Attack"
        description: "Unmanned aerial vehicle (UAV) strike on a target"
      - type: "military.ground_offensive"
        label: "Ground Offensive"
        description: "Large-scale land-based military assault or advance"
      - type: "military.naval_engagement"
        label: "Naval Engagement"
        description: "Combat or confrontation involving naval vessels"
      - type: "military.troop_deployment"
        label: "Troop Deployment"
        description: "Movement or positioning of military ground forces"
      - type: "military.ceasefire"
        label: "Ceasefire"
        description: "Temporary or permanent halt of military hostilities"
      - type: "military.weapons_test"
        label: "Weapons Test"
        description: "Testing or demonstration of a new or existing weapon system"
      - type: "military.military_exercise"
        label: "Military Exercise"
        description: "Planned training operation simulating combat or logistical scenarios"

  political:
    label: "Political"
    types:
      - type: "political.election"
        label: "Election"
        description: "National, regional, or local democratic election event"
      - type: "political.coup"
        label: "Coup"
        description: "Sudden, unlawful seizure of government by a group or faction"
      - type: "political.diplomatic_summit"
        label: "Diplomatic Summit"
        description: "High-level meeting between heads of state or senior officials"
      - type: "political.sanctions_imposed"
        label: "Sanctions Imposed"
        description: "Political or legal penalties applied against a country or entity"
      - type: "political.treaty_signed"
        label: "Treaty Signed"
        description: "Formal agreement signed between two or more states"
      - type: "political.government_formation"
        label: "Government Formation"
        description: "Establishment of a new government or coalition after an election"
      - type: "political.political_protest"
        label: "Political Protest"
        description: "Organized public demonstration against a government policy or action"

  economic:
    label: "Economic"
    types:
      - type: "economic.trade_agreement"
        label: "Trade Agreement"
        description: "Bilateral or multilateral deal governing the exchange of goods and services"
      - type: "economic.market_crash"
        label: "Market Crash"
        description: "Rapid and significant decline in financial market values"
      - type: "economic.sanctions_economic"
        label: "Economic Sanctions"
        description: "Financial or trade restrictions imposed for economic or political leverage"
      - type: "economic.energy_deal"
        label: "Energy Deal"
        description: "Agreement covering oil, gas, nuclear, or renewable energy supply or infrastructure"
      - type: "economic.currency_crisis"
        label: "Currency Crisis"
        description: "Severe devaluation or instability of a national currency"
      - type: "economic.supply_chain_disruption"
        label: "Supply Chain Disruption"
        description: "Breakdown or interruption in the production or distribution of goods"
      - type: "economic.debt_default"
        label: "Debt Default"
        description: "Failure of a sovereign or major entity to meet debt repayment obligations"

  space:
    label: "Space"
    types:
      - type: "space.satellite_launch"
        label: "Satellite Launch"
        description: "Deployment of a satellite or payload into Earth orbit"
      - type: "space.orbital_maneuver"
        label: "Orbital Maneuver"
        description: "Deliberate repositioning of a spacecraft in orbit"
      - type: "space.space_debris_event"
        label: "Space Debris Event"
        description: "Collision, fragmentation, or hazardous debris event in Earth orbit"
      - type: "space.space_station_activity"
        label: "Space Station Activity"
        description: "Crew operations, docking, or maintenance on a space station"
      - type: "space.deep_space_mission"
        label: "Deep Space Mission"
        description: "Mission targeting destinations beyond Earth orbit (Moon, Mars, asteroids, etc.)"
      - type: "space.anti_satellite_test"
        label: "Anti-Satellite Test"
        description: "Test or demonstration of a weapon or system capable of destroying satellites"
      - type: "space.rocket_failure"
        label: "Rocket Failure"
        description: "Launch vehicle malfunction resulting in mission loss or abort"

  cyber:
    label: "Cyber"
    types:
      - type: "cyber.ransomware_attack"
        label: "Ransomware Attack"
        description: "Malicious software encrypts victim data and demands ransom for decryption"
      - type: "cyber.data_breach"
        label: "Data Breach"
        description: "Unauthorized access to or exfiltration of sensitive data"
      - type: "cyber.ddos_attack"
        label: "DDoS Attack"
        description: "Distributed denial-of-service attack overwhelming a target's network or service"
      - type: "cyber.espionage_campaign"
        label: "Espionage Campaign"
        description: "State- or actor-sponsored cyber operation to steal intelligence"
      - type: "cyber.critical_infrastructure_hack"
        label: "Critical Infrastructure Hack"
        description: "Cyberattack targeting power grids, water systems, hospitals, or similar assets"
      - type: "cyber.zero_day_exploit"
        label: "Zero-Day Exploit"
        description: "Attack exploiting a previously unknown vulnerability in software or hardware"
      - type: "cyber.disinformation_campaign"
        label: "Disinformation Campaign"
        description: "Coordinated online operation to spread false narratives or manipulate public opinion"

  environmental:
    label: "Environmental"
    types:
      - type: "environmental.earthquake"
        label: "Earthquake"
        description: "Seismic event causing ground shaking and potential structural damage"
      - type: "environmental.flood"
        label: "Flood"
        description: "Overflow of water submerging land normally not covered by water"
      - type: "environmental.wildfire"
        label: "Wildfire"
        description: "Uncontrolled fire spreading through natural vegetation"
      - type: "environmental.volcanic_eruption"
        label: "Volcanic Eruption"
        description: "Explosive or effusive discharge of lava, ash, and gases from a volcano"
      - type: "environmental.oil_spill"
        label: "Oil Spill"
        description: "Release of crude oil or petroleum products into the environment"
      - type: "environmental.drought"
        label: "Drought"
        description: "Prolonged period of abnormally low rainfall causing water scarcity"
      - type: "environmental.tsunami"
        label: "Tsunami"
        description: "Series of ocean waves triggered by seismic or submarine landslide activity"

  social:
    label: "Social"
    types:
      - type: "social.mass_protest"
        label: "Mass Protest"
        description: "Large-scale public demonstration driven by social or political grievances"
      - type: "social.refugee_crisis"
        label: "Refugee Crisis"
        description: "Significant displacement of populations fleeing conflict, persecution, or disaster"
      - type: "social.public_health_emergency"
        label: "Public Health Emergency"
        description: "Disease outbreak or health threat requiring emergency public health response"
      - type: "social.cultural_event"
        label: "Cultural Event"
        description: "Significant cultural, religious, or ceremonial event with broad societal impact"
      - type: "social.labor_strike"
        label: "Labor Strike"
        description: "Organized work stoppage by employees to press for better conditions or pay"
      - type: "social.ethnic_violence"
        label: "Ethnic Violence"
        description: "Intercommunal or ethnic group conflict resulting in casualties or displacement"

  humanitarian:
    label: "Humanitarian"
    types:
      - type: "humanitarian.famine"
        label: "Famine"
        description: "Severe and widespread food shortage causing mass starvation"
      - type: "humanitarian.epidemic_outbreak"
        label: "Epidemic Outbreak"
        description: "Rapid spread of an infectious disease within a region or population"
      - type: "humanitarian.refugee_displacement"
        label: "Refugee Displacement"
        description: "Forced movement of civilian populations due to conflict or disaster"
      - type: "humanitarian.aid_delivery"
        label: "Aid Delivery"
        description: "Distribution of humanitarian assistance including food, medicine, or shelter"
      - type: "humanitarian.civilian_casualties"
        label: "Civilian Casualties"
        description: "Non-combatant deaths or injuries as a result of armed conflict or disaster"
      - type: "humanitarian.hostage_situation"
        label: "Hostage Situation"
        description: "Unlawful detention of civilians used as leverage in negotiations"

  infrastructure:
    label: "Infrastructure"
    types:
      - type: "infrastructure.bridge_collapse"
        label: "Bridge Collapse"
        description: "Structural failure of a bridge causing disruption or casualties"
      - type: "infrastructure.power_grid_failure"
        label: "Power Grid Failure"
        description: "Large-scale electricity outage affecting regions or entire countries"
      - type: "infrastructure.telecommunications_outage"
        label: "Telecommunications Outage"
        description: "Disruption of internet, telephone, or broadcast communications networks"
      - type: "infrastructure.pipeline_disruption"
        label: "Pipeline Disruption"
        description: "Damage, sabotage, or operational failure of oil, gas, or water pipelines"
      - type: "infrastructure.port_closure"
        label: "Port Closure"
        description: "Temporary or permanent closure of a maritime or air port"
      - type: "infrastructure.dam_failure"
        label: "Dam Failure"
        description: "Structural breach or collapse of a dam resulting in flooding"
      - type: "infrastructure.rail_accident"
        label: "Rail Accident"
        description: "Train derailment, collision, or significant rail network disruption"

  civil:
    label: "Civil"
    types:
      - type: "civil.protest"
        label: "Civil Protest"
        description: "Public demonstration or organized opposition by civilians (CAMEO root 14)"
      - type: "civil.demonstration"
        label: "Civil Demonstration"
        description: "Public assembly to express collective opinion or position"
      - type: "civil.unrest"
        label: "Civil Unrest"
        description: "Generalized civilian disorder, riots, or violent crowd activity"

  posture:
    label: "Posture"
    types:
      - type: "posture.military"
        label: "Military Posture"
        description: "Force movement, deployment, or mobilization without active combat (CAMEO root 15)"
      - type: "posture.deployment"
        label: "Force Deployment"
        description: "Repositioning of military forces to a theater or staging area"
      - type: "posture.mobilization"
        label: "Mobilization"
        description: "Activation of reserves or transition to wartime force structure"

  conflict:
    label: "Conflict"
    types:
      - type: "conflict.coercion"
        label: "Coercion"
        description: "Sanctions, threats, asset freezes, or coercive pressure short of force (CAMEO root 17)"
      - type: "conflict.assault"
        label: "Assault"
        description: "Targeted assaults, assassinations, or violent incidents (CAMEO root 18)"
      - type: "conflict.armed"
        label: "Armed Conflict"
        description: "Firefights, artillery exchanges, or armed engagements (CAMEO root 19)"
      - type: "conflict.mass_violence"
        label: "Mass Violence"
        description: "Massacres, ethnic cleansing, or weapons of mass destruction events (CAMEO root 20)"
      - type: "conflict.clash"
        label: "Clash"
        description: "Localized armed clash between forces or factions"
      - type: "conflict.shelling"
        label: "Shelling"
        description: "Indirect-fire artillery or mortar bombardment"

  other:
    label: "Other"
    types:
      - type: "other.unclassified"
        label: "Unclassified"
        description: "Event that does not fit any defined category; used as fallback classifier"
      - type: "other.unknown_event"
        label: "Unknown Event"
        description: "Event where type or nature cannot be determined from available information"
      - type: "other.miscellaneous"
        label: "Miscellaneous"
        description: "Noteworthy event that spans multiple categories or defies standard classification"
