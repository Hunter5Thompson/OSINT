  description: Die Modulare Abstandswaffe “TAURUS KEPD-350”, entwickelt Anfang der
    2000er Jahre und seit 2005 im Einsatz, ist eines der modernsten Lenkflugkörpersysteme
    der Luftwaffe. Um die Einsatzfähigkeit zu sichern, wird der TAURUS-Bestand der
    Bundeswehr ab 2025 im Rahmen einer zweiten Grundüberholung modernisiert. Eine
    entsprechende Rahmenvereinbarung wurde heute vom Beschaffungsamt der Bundeswehr
    unterzeichnet. Die Finanzierung erfolgt über den regulären Verteidigungshaushalt
    und das Sondervermögen Bundeswehr. Der etwa fünf Meter lange und 1.400 Kilogramm
    schwere Marschflugkörper ist mit einem eigenen Triebwerk und Missionsplanungssystem
    ausgestattet. TAURUS, kurz für “Target Adaptive Unitary and Dispenser Robotic
    Ubiquity System”, ermöglicht die präzise Bekämpfung strategisch wichtiger Ziele
    aus großer Entfernung, ohne dass Piloten in feindlichen Luftraum eindringen müssen.
    Der Flugkörper ist derzeit mit dem Tornado-Kampfflugzeug kompatibel, eine Integration
    in den Eurofighter wird vorbereitet. Die Bundeswehr verfügt über rund 600 TAURUS,
    von denen jedoch nur rund die Hälfte einsatzbereit sein soll. Bis 2030 hat man
    der NATO insgesamt 1.000 Air Launched Cruise Missile (ALCM) zugesagt. Daher ist
    die Beschaffung von [600 neuen TAURUS Neo](https://suv.report/bundeswehr-will-600-neue-marschflugkoerper-beschaffen/)
    geplant.
