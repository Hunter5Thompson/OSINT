  financing: Einzelplan 14 (Kapitel 1404 Titel 551 11 )
  delivery_start: null
  delivery_end: null
  delivery_raw: N/A
  description: 'Das BAAINBw hat einen Vertrag mit der Gesellschaft für Intelligente
    Wirksysteme (GIWS) zur Beseitigung von Obsoleszenzen der Artilleriemunition vom
    Typ SMArt 155 (Suchzündermunition Artillerie, 155 mm) geschlossen. Der Auftragswert
    beläuft sich auf etwa 97,4 Millionen Euro. Zudem wurden ergänzende Verträge im
    Umfang von rund 5,2 Millionen Euro geschlossen. SMArt 155 wurde im Oktober 2000
    eingeführt, um gepanzerte Ziele auf größere Distanz effektiv bekämpfen und schnell
    operative Schwerpunkte verlagern zu können. Derzeit verfügt die Bundeswehr über
    rund 8.600 Geschosse dieses Typs, wobei künftig ein deutlich erhöhter Bedarf erwartet
    wird.

    Zur Deckung dieses steigenden Bedarfs ist es notwendig, die von Obsoleszenzen
    betroffenen Komponenten zu erneuern und ab 2027 neue Munition zu beschaffen. Als
    wesentliche Unterauftragnehmer der GIWS sind Rheinmetall Waffe Munition (RWM)
    in Unterlüß, Diehl Defence in Röthenbach a. d. Pegnitz und Hensoldt Sensors in
    Ulm beteiligt. Das Vorhaben ist im Bundeshaushalt und Finanzplan berücksichtigt.

    Ab 2027 ist zusätzlich die Beschaffung von etwa 10.000 neuen Geschossen SMArt
    155 in zwei Serienlosen vorgesehen. Diese künftige Beschaffung einschließlich
    Serienvorbereitung und Produktionsunterstützung wird mit rund 810 Millionen Euro
    veranschlagt und in einer separaten Vorlage behandelt.'
  suv_url: https://suv.report/modernisierungsvorhaben/
