- title: Beobachtungs- und Aufklärungsausstattung III
  branch: Heer
  typ: Beobachtungs- und Aufklärungsausstattung (BAA)
  status: bestellt
  contractor_raw: KNDS Deutschland & Hensoldt
  quantity: 92
  quantity_raw: '92'
  cost_eur: 86000000.0
  cost_raw: 86 Mio. Euro
  financing: Sondervermögen Bundeswehr & Einzelplan 14
  delivery_start: 2027
  delivery_end: 2029
  delivery_raw: 2027 – 2029
  description: Das BAAINBw hat KNDS Deutschland und Hensoldt mit der Modernisierung
    des Spähwagens Fennek beauftragt. Das Hauptwaffensystem der Heeresaufklärungstruppe
    wird mit einer neuen Beobachtungs- und Aufklärungsausstattung (BAA) III ausgestattet.
    Diese Modernisierung betrifft 30 Spähwagen Fennek 1A2 und 50 Joint Fire Support
    Team (JFST) Fennek, inklusive einer Umlaufreserve zur Erhöhung der Einsatzbereitschaft.
    Ende Juni genehmigte der Haushaltsausschuss des Deutschen Bundestages die dafür
    notwendigen Mittel im Rahmen einer 25-Millionen-Euro-Vorlage. Das Kostenvolumen
    beträgt knapp 86 Millionen Euro. Die Finanzierung erfolgt über das Sondervermögen
    Bundeswehr und den regulären Verteidigungsetat. Die Lieferung und Integration
    der neuen BAA sind für 2027 bis 2029 geplant. Die BAA, Hauptaufklärungsmittel
    des Fenneks, umfasst ein Wärmebildgerät, eine Tagsichtkamera und einen Laserentfernungsmesser,
    die auf einem ausfahrbaren Mast montiert sind. Zusätzlich wird ein Lasertarget-Designator
    integriert. Der Fennek, seit 2003 in Nutzung, ermöglicht es der dreiköpfigen Besatzung,
    bei Tag, Nacht und schlechter Sicht Informationen über gegnerische Kräfte zu sammeln.
  suv_url: https://suv.report/modernisierungsvorhaben/
- title: Zukünftiges System Indirektes Feuer mittlere Reichweite – Panzerhaubitze
    2000
  branch: Heer
  typ: Panzerhaubitze
  status: geplant
  contractor_raw: /
  quantity: 120
  quantity_raw: '120'
  cost_eur: null
  cost_raw: N/A
  financing: offen
  delivery_start: 2031
  delivery_end: 2031
  delivery_raw: bis 2031
  description: 120 Panzerhaubitzen 2000 von KMW, basierend auf dem Leopard-Fahrgestell
    und ausgestattet mit dem 155 mm L/52 Waffensystem von Rheinmetall, werden der
    Truppe zukünftig zur Verfügung stehen. Sie verfügen über kurze Reaktionszeiten
    und sind dank einer Kombination aus hybrider Navigationsanlage und ballistischem
    Rechner autonom und schnell einsetzbar. Die Panzerhaubitze hat eine hohe Feuerrate
    von zwölf Schuss pro Minute und kann eine Vielzahl von Munitionstypen, wie Spreng-,
    Suchzünder-, Leucht- und Nebelmunition, verwenden. Durch den Einsatz von automatisch
    justierbaren Zündern, modularen Treibladungen und innovativen Geschossen können
    Ziele in Entfernung von 40+ km präzise bekämpft werden. Die spezialisierte Suchzündermunition
    (SMArt) von der Gesellschaft für Intelligente Wirksysteme mbH (Diehl und Rheinmetall)
    zeichnet sich durch eine hohe Ersttrefferwahrscheinlichkeit aus und ist effektiv
    gegen gepanzerte Ziele auf Entfernungen von bis zu 27 km. Diese Munition setzt
    zwei Wirkungsträger frei, die nach einer festgelegten Flugzeit mit einer dreifachen
    Sensorik während des Sinkflugs Ziele identifizieren. Anschließend durchdringen
    sie mit hoher kinetischer Energie die Panzerung von oben. Um Blindgänger zu vermeiden,
    zerlegt sich die Submunition automatisch. Zukünftig ist die Anschaffung modernisierter
    SMArt-Munition geplant. Zusätzlich schützt die neue Nebelmunition 155 mm die eigenen
    Kräfte durch einen multispektralen Nebel, der sowohl im optischen als auch im
    Laser- und einzigartig im Infrarot-Bereich die Sicht einschränkt. Bis zum Jahr
    2031 ist die Entwicklung des Zukünftigen Systems Indirektes Feuer mittlerer Reichweite
    vorgesehen. Die geplante Einsatzdauer der 108 Panzerhaubitzen 2000 in den mechanisierten
    Brigaden soll bis mindestens 2040 verlängert werden. Eine Verringerung der Besatzungsgröße
    durch Automatisierung ist ebenso geplant wie Verbesserungen bei Schutz, Sekundärbewaffnung
    sowie Funk- und Bedienungselementen. Ziel ist auch, die Kampfentfernung auf etwa
    75 km zu steigern, insbesondere durch den Einsatz fortgeschrittener Munition und
    Treibmittel mit erhöhtem Gasdruck. Seit Herbst 2018 ersetzt das unempfindliche
    Sprenggeschoss 155 mm HE, DM121, ältere Munitionstypen wie DM21 und L15. Dieses
    Geschoss kann sowohl bei Tag als auch bei Nacht mit speziellen Optiken der Haubitze
    gegen Infrastruktur- und gepanzerte Ziele eingesetzt werden. Eine Nachbestellung
    dieser Sprenggeschosse ist Teil der aktuellen Maßnahmen. Ab 2024 wird die lasergesteuerte
    155-mm-Präzisionsmunition Vulcano von den Firmen OTO Melara (Italien) und Diehl
    Defence in den Dienst gestellt. Diese eignet sich vor allem für den Einsatz gegen
    weiche und halbharte Einzelziele in Stabilisierungsmissionen, urbanen Gebieten
    und komplexen Gefechtssituationen. Sie ermöglicht eine sehr präzise Zielbekämpfung
    auf Distanzen über 60 km und minimiert dabei Kollateralschäden. Zudem besteht
    die Möglichkeit, Missionen abzubrechen. Die Vulcano-Geschosse werden entweder
    über GPS oder durch Lasermarkierung in das Ziel geführt, wobei ein Joint Fire
    Support Team (JFST) für die Laserzielerfassung verantwortlich ist. Ab etwa 2026
    könnte die Einführung von Korrekturzündern für bereits im Einsatz befindliche
    155-mm-Geschosse die präzise Bekämpfung von Flächenzielen mit einer Genauigkeit
    von bis zu 50 Metern erfolgen.
  suv_url: https://suv.report/modernisierungsvorhaben/
