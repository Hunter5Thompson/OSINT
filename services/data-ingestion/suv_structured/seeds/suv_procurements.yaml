    \ 33), GPS-Integration, Freund-Feind-Kennung sowie Beseitigung gemeldeter Obsoleszenzen\
    \ zur Sicherung der Flug- und Einsatzfähigkeit.\n  * **Führungsfähigkeit (30,5\
    \ Mio. Euro):** Kryptomodernisierung für Sprach- und Datenfunk inklusive Schlüsselverteilung.\n\
    \  * **Selbstschutz (17,2 Mio. Euro):** Software-Updates und Anpassungen an Täuschkörperbehältern.\n\
    \  * **Integriertes Helmsystem (3,5 Mio. Euro):** Ausbau industrieller Instandsetzungskapazitäten.\n\
    \  * **Software Hubschrauber/Einsatzunterstützung (17,9 Mio. Euro):** Anpassungen\
    \ der Basissoftware sowie der Einsatzunterstützungsanlage und Simulatoren.\n \
    \ * **Mastvisier (0,8 Mio. Euro):** Fehlerbehebung per Softwareupdate.\n  * **Software\
    \ Rakete (3 Mio. Euro):** Anpassung des Feuerleit-Algorithmus.\n\n\nDie Regierung\
    \ weist darauf hin, dass es sich um Kostenschätzungen handelt und weitere, derzeit\
    \ nicht absehbare Obsoleszenzen zusätzliche Ausgaben verursachen können."
