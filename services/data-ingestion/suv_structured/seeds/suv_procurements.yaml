  description: "Am 28. Juni 2021 hat das BAAINBw mit der PSM Projekt System & Management\
    \ GmbH einen Rahmenvertrag zur konsolidierten Nachrüstung des Schützenpanzer Puma\
    \ geschlossen. Der Vertrag beinhaltet die Modernisierung von bis zu 297 Puma auf\
    \ den sogenannten S1 Konfigurationsstand. Aufgrund knapper Haushaltsmittel wurde\
    \ 2021 jedoch nur die Modernisierung von 154 Schützenpanzern für eine Milliarde\
    \ Euro beauftragt. Diese sollen bis 2026 zur Verfügung stehen. Am 19. April 2023\
    \ folgte dann auch der Auftrag, die rechtlichen 143 Puma auf den S1 Konfigurationsstand\
    \ zu modernisieren. Dafür sind weitere 850,5 Millionen Euro vonnöten, welche aus\
    \ dem Sondervermögen Bundeswehr finanziert werden. Bis 2029 sollen dann alle Puma\
    \ des Ersten Loses modernisiert sein. Abgesehen von 13 Fahrschulpanzern und 40\
    \ Puma im VJTF-2023-Stand. Ab 2029 sollen dann auch die 40 Puma VJTF auf den S1\
    \ Stand gebracht werden. Im Vergleich zum Basis-Puma verfügen die Puma S1 über\
    \ folgende Verbesserungen:\n  * Integrierter Werfer für zwei Panzerabwehrlenkflugkörper\
    \ MELLS\n  * Vorrüstung zur Aufnahme der Turmunabhängigen Sekundärwaffenanlage\
    \ (TSWA) \n  * Neue digitale querschnittliche Streitkräftegemeinsame Verbundfähige\
    \ Funkgeräteausstattung (SVFuA)\n  * Neue Bordverständigungsanlage SOTAS IP6R\n\
    \  * Neues explosionssicheres GPS-Navigationssystem ERGER II\n  * Neues Rundum-\
    \ und Fahrersichtsystem"
