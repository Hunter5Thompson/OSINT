  description: Das BAAINB hat einen Vertrag mit Lockheed Martin (USA) über rund 206
    Mio. Euro zur Beschaffung und Integration von sechs DIRCM-Selbstschutzsystemen
    in drei deutsche C-130J-30 und drei KC-130J-Transportflugzeuge geschlossen. Der
    Auftrag umfasst neben den Systemen selbst deren Muster- und Serienintegration,
    technische Dokumentation, Ausbildungsunterlagen sowie Schulungen für Besatzung
    und Wartungspersonal. DIRCM (Directed Infrared Countermeasures) lenkt anfliegende
    infrarotgelenkte Raketen mithilfe laserbasierter Störcodes vom Flugzeug ab. Unterauftragnehmer
