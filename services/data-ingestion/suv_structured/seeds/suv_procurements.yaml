- title: A350-900
  branch: Luftwaffe
  typ: Passagierflugzeuge
  status: bestellt
  contractor_raw: Lufthansa Technik
  quantity: 3
  quantity_raw: '3'
  cost_eur: 240750000.0
  cost_raw: 240,75 Mio. Euro
  financing: Einzelplan 60 (Kapitel 6002 Titel 811 01)
  delivery_start: null
  delivery_end: null
  delivery_raw: N/A
  description: 'Die deutschen Regierungsflieger vom Typ Airbus A350 werden künftig
    mit einem modernen Selbstschutzsystem gegen infrarotgelenkte Raketen ausgerüstet.
    Nach der Genehmigung durch den Haushaltsausschuss des Bundestages wurde Lufthansa
    Technik mit der Integration der DIRCM-Systeme beauftragt.

    Die drei A350-Langstreckenjets der Flugbereitschaft des Verteidigungsministeriums
    erhalten sogenannte DIRCM-Systeme (Directed InfraRed Counter Measures) des israelischen
    Herstellers Elbit Systems. Diese Technologie schützt vor schultergestützten Flugabwehrraketen
    (MANPADS) mit Infrarotsuchköpfen, indem sie anfliegende Geschosse durch gezielte
    Störcodes ablenkt. Die Besatzung muss dabei nicht aktiv eingreifen.

    Der Vertrag mit Lufthansa Technik stellt weltweit die erste Modifikation einer
    A350 mit einem derartigen Selbstschutzsystem dar. Um die Verfügbarkeit der Regierungsflieger
    nicht zu beeinträchtigen, erfolgt die Nachrüstung während regulärer Wartungsintervalle.
    Lufthansa Technik wird dabei eng mit Elbit Systems und Airbus zusammenarbeiten.

    Nach Angaben von Lufthansa Technik wird das Projekt über einen Zeitraum von fünf
    Jahren ausgeführt. Mit der Installation dieser Schutzsysteme stehen der Flugbereitschaft
    künftig vollständig geschützte Großraum-Langstreckenflugzeuge für den politisch-parlamentarischen
    Lufttransport zur Verfügung. Die Kosten für das Gesamtpaket belaufen sich auf
    240,75 Millionen Euro.'
  suv_url: https://suv.report/modernisierungsvorhaben/
