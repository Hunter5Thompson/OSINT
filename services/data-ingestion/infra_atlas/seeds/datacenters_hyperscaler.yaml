# Hyperscaler datacenter campus seed for Worldview.
#
# Each entry is a real cloud-provider campus with coords sourced from
# operator pages, Wikipedia infoboxes, baxtel.com, datacenters.com, or
# DCD reporting. Coords are the actual campus, NOT the city centroid —
# the builder rejects entries within 1 km of any centroid in
# known_city_centroids.json.
#
# Names mirror the existing curated dataset names where possible so that
# (name, country) override-on-merge replaces legacy centroid-placed entries.

