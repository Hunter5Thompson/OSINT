services:

  # ═══ VLLM (LLM Inference — startet zuerst, allein auf GPU) ═══
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    environment:
      - VLLM_FLASH_ATTN_VERSION=2
    volumes:
      - ${MODELS_PATH:-/home/deadpool-ultra/ODIN/models}:/models
    command: >
      --model /models/qwen3.5-27b-awq
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --enforce-eager
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ═══ TEI EMBED (startet erst wenn vLLM healthy) ═══
  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
    ports:
      - "8001:80"
    volumes:
      - tei-embed-cache:/data
    command: --model-id Qwen/Qwen3-Embedding-0.6B --dtype float16
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped

  # ═══ TEI RERANK (startet erst wenn vLLM healthy) ═══
  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
    ports:
      - "8002:80"
    volumes:
      - tei-rerank-cache:/data
    command: --model-id BAAI/bge-reranker-v2-m3 --dtype float16
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      vllm:
        condition: service_healthy
      tei-embed:
        condition: service_started
    restart: unless-stopped

  # ═══ NEO4J ═══
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-odin1234}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:7474 -O /dev/null && echo ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ═══ BACKEND (FastAPI) — Host-Port 8080, Container intern 8000 ═══
  # Port-Konflikt: vLLM belegt Host-Port 8000.
  # Lösung: 8080:8000 — kein Dockerfile-Change nötig.
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - VLLM_URL=http://vllm:8000
      - TEI_EMBED_URL=http://tei-embed:80
      - TEI_RERANK_URL=http://tei-rerank:80
      - NEO4J_URL=bolt://neo4j:7687
    volumes:
      - ./services/backend/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ═══ INTELLIGENCE (LangGraph RAG Pipeline) ═══
  intelligence:
    build:
      context: ./services/intelligence
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - VLLM_URL=http://vllm:8000
      - TEI_EMBED_URL=http://tei-embed:80
      - TEI_RERANK_URL=http://tei-rerank:80
      - NEO4J_URL=bolt://neo4j:7687
    depends_on:
      tei-embed:
        condition: service_healthy
      tei-rerank:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ═══ DATA INGESTION (Scheduled Feeds) ═══
  data-ingestion:
    build:
      context: ./services/data-ingestion
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - TEI_EMBED_URL=http://tei-embed:80
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      tei-embed:
        condition: service_started
    restart: unless-stopped

  # ═══ FRONTEND ═══
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./services/frontend/src:/app/src
    depends_on:
      - backend

  # ═══ REDIS ═══
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ═══ QDRANT ═══
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
  qdrant-data:
  neo4j-data:
  tei-embed-cache:
  tei-rerank-cache:
